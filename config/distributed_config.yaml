sim_config:
  dt: 0.01
  time_horizon: 600
  seed: 42

priority_config:
  responsible_controller: micro
  priority_method: even
  evs: 3

pcc:
  name: pcc
  update_interval_s: 1.0
  set_delay_s: 0.5

central_controller:
  type: ConstantCentralController
  params:
    name: cc
    init_p_setpoint: 20.0
    update_interval_s: Null
    set_delay_s: Null
    get_delay_s: Null
    calculation_delay_s: Null

micro_controllers:
  type: RuleMicroController
  params:
    init_p_setpoint: 0.0
    update_interval_s: 3.0
    set_delay_s: 0.5
    get_delay_s: 0.5
    calculation_delay_s: Null
    i_min: 6.0
    i_rounding_method: floor
    i_granularity: 1.0

chargers:
  type: IntegratedCharger
  params:
    init_p_setpoint: 0.0
    set_delay_s: 0.5
    get_delay_s: 0.5
    charger_config: wattpilot_22.yaml
    i_min: 6.0
    i_rounding_method: floor
    i_granularity: 1.0

ev_generation:
  max_connected_evs: 3
  avg_connection_time: 240
  avg_idle_time: 120
  ev_configs: [skoda_enyaq_iV60_2021.yaml, tesla_model3_LRDM_2020.yaml, vw_id3_pro_2022.yaml]
  e_required_kwh: 10.0
  init_soc: 0.0